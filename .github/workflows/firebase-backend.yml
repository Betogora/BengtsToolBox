name: Deploy Firebase Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'firebase/**'
      - 'firebase.json'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install app dependencies
        run: npm ci
      - name: Test Firebase rules
        run: npm run test:firebase
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BENGTSTOOLBOX }}
      - name: Deploy rules and indexes
        run: >-
          npx firebase-tools@15.22.1 deploy
          --only firestore:rules,firestore:indexes
          --project bengtstoolbox
          --non-interactive
